<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>We Have Moved</title>
    <style>
        body {
            background-color: #f9fafb;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            color: #1f2937;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
            box-sizing: border-box;
        }
        .card {
            background-color: #ffffff;
            max-width: 800px; /* Expanded from 600px to prevent truncation */
            width: 100%;
            padding: 40px 40px; 
            text-align: center;
            border-radius: 16px;
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1), 0 4px 6px -2px rgba(0, 0, 0, 0.05);
            border: 1px solid #f3f4f6;
            box-sizing: border-box;
        }
        h1 {
            color: #000000; /* Kept black as requested */
            font-size: 32px;
            font-weight: 800;
            margin-top: 0;
            margin-bottom: 16px;
        }
        .instruction {
            color: #4b5563;
            font-size: 18px;
            margin-bottom: 24px;
        }
        .web-link {
            display: block;
            color: #2563eb; /* Restored to original blue color */
            font-size: 32px; /* Adjusted slightly down from 38px for a perfect fit */
            font-weight: 900;
            text-decoration: underline;
            word-break: keep-all; /* Prevents ugly mid-word line splits */
            overflow-wrap: break-word; /* Safe fallback for small mobile screens */
            margin-bottom: 32px;
            line-height: 1.2;
        }
        .web-link:hover {
            color: #1d4ed8; /* Restored original darker blue hover effect */
        }
        .footer-badge {
            display: inline-block;
            background-color: #f3f4f6; 
            color: #4b5563; 
            font-weight: 600;
            padding: 8px 16px;
            border-radius: 9999px;
            font-size: 14px;
        }
    </style>
</head>
<body>

    <div class="card">
        <h1>We have moved</h1>
        <p class="instruction">Our new web address is:</p>
        
        <a href="https://christslovechristianschool.info" class="web-link">
            https://christslovechristianschool.info
        </a>
        
        <div class="footer-badge">
            © 2026 Christ's Love Christian School. All rights reserved.
        </div>
    </div>

</body>
</html>
